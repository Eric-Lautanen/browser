<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cascade Custom Properties Test</title>
<style>
  :root { --main-color: red; --font-size: 20px; --spacing: 10px; --border-color: black; }
  .theme { --main-color: blue; --bg: lightgray; }
  .child { --font-size: 24px; }
  #fallback { color: var(--undefined-color, purple); }
  #nested { font-size: var(--font-size, 16px); border: 2px solid var(--border-color, gray); }
</style>
</head>
<body>
  <div class="theme" style="color: var(--main-color); background: var(--bg, white); padding: var(--spacing);">
    Should be blue text on lightgray background with 10px padding.
    <div class="child" style="color: var(--main-color); font-size: var(--font-size);">
      Should be blue text (inherited from .theme) at 24px font (overridden by .child).
    </div>
  </div>
  <div id="fallback">Should be purple (fallback for undefined variable).</div>
  <div id="nested">Should have font-size from :root and border with color from :root.</div>
</body>
</html>

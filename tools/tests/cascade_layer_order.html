<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cascade Layer Order</title>
<style>
@layer base, theme, override;

@layer base {
  .box { background: #c00; color: #fff; border: 2px solid #666; }
}
@layer theme {
  .box { background: #090; color: #ff0; }
}
@layer override {
  .box { background: #00c; border-color: #c00; }
}
.box {
  padding: 10px;
  margin: 10px;
  width: 200px;
  text-align: center;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="box">Layer order: override (applied last) sets background blue</div>
</body>
</html>

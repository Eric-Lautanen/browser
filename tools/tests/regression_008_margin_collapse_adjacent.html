<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Regression 008: Margin Collapse Adjacent</title>
<style>
.parent {
  border: 2px solid #c00;
  margin: 10px;
  padding: 2px;
  background: #f5f5f5;
}
.a {
  margin-bottom: 30px;
  height: 40px;
  background: #fdc;
  border: 1px solid #c90;
}
.b {
  margin-top: 20px;
  height: 40px;
  background: #cfc;
  border: 1px solid #090;
}
.info {
  margin: 10px;
  padding: 5px;
  background: #eef;
  border: 1px solid #99f;
}
</style>
</head>
<body>
<div class="parent">
  <div class="a">margin-bottom: 30px</div>
  <div class="b">margin-top: 20px</div>
</div>
<div class="info">Margins collapse: 30px wins over 20px. Gap between boxes = 30px not 50px.</div>
</body>
</html>

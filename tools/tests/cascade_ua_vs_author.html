<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cascade UA vs Author Test</title>
<style>
  h1 { font-size: 18px; margin: 5px; padding: 2px; display: block; }
  p { margin: 0; padding: 0; font-size: 14px; }
  div { display: block; margin: 0; padding: 0; }
  a { display: inline; margin: 0; padding: 0; font-size: 14px; }
</style>
</head>
<body>
  <h1>Author styles override UA defaults: font-size 18px, margin 5px, padding 2px, display block.</h1>
  <p>Author overrides: margin 0, padding 0, font-size 14px.</p>
  <div>Author overrides: margin 0, padding 0, display block.</div>
  <a href="#">Author overrides: display inline, margin 0, padding 0, font-size 14px.</a>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cascade Animation Override</title>
<style>
@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes grow {
  from { width: 0px; background: #c00; }
  to { width: 200px; background: #0c0; }
}
@keyframes shift {
  from { margin-left: 0px; }
  to { margin-left: 100px; }
}
.anim {
  animation: fade-in 2s ease-in, grow 2s ease-out, shift 2s ease;
  height: 40px;
  margin: 10px;
  padding: 4px;
  color: #fff;
  font-weight: bold;
  text-align: center;
  line-height: 40px;
  overflow: hidden;
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="anim">Animated: opacity, width, margin-left</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Layout Flexbox Test</title>
<style>
  body { margin: 8px; }
  .flex-row { display: flex; flex-direction: row; gap: 10px; background: lightblue; margin-bottom: 10px; }
  .flex-column { display: flex; flex-direction: column; gap: 5px; background: lightgreen; height: 200px; margin-bottom: 10px; }
  .flex-wrap { display: flex; flex-wrap: wrap; width: 250px; gap: 10px; background: lightcoral; margin-bottom: 10px; }
  .flex-wrap .item { width: 80px; height: 50px; background: lightyellow; }
  .justify-start { display: flex; justify-content: flex-start; background: lightsalmon; margin-bottom: 10px; }
  .justify-center { display: flex; justify-content: center; background: lightpink; margin-bottom: 10px; }
  .justify-end { display: flex; justify-content: flex-end; background: lightcyan; margin-bottom: 10px; }
  .justify-between { display: flex; justify-content: space-between; background: lavender; margin-bottom: 10px; }
  .justify-around { display: flex; justify-content: space-around; background: mistyrose; margin-bottom: 10px; }
  .justify-evenly { display: flex; justify-content: space-evenly; background: honeydew; margin-bottom: 10px; }
  .align-start { display: flex; align-items: flex-start; height: 80px; background: lightblue; margin-bottom: 10px; }
  .align-center { display: flex; align-items: center; height: 80px; background: lightgreen; margin-bottom: 10px; }
  .align-end { display: flex; align-items: flex-end; height: 80px; background: lightcoral; margin-bottom: 10px; }
  .align-stretch { display: flex; align-items: stretch; height: 80px; background: lightyellow; margin-bottom: 10px; }
  .align-self { display: flex; align-items: flex-start; height: 80px; background: lightpink; margin-bottom: 10px; }
  .align-self .self-center { align-self: center; }
  .align-self .self-end { align-self: flex-end; }
  .align-content { display: flex; flex-wrap: wrap; align-content: center; height: 150px; width: 200px; background: lavender; margin-bottom: 10px; }
  .align-content .item { width: 50px; height: 30px; background: lightcoral; margin: 5px; }
  .flex-grow { display: flex; width: 400px; background: lightblue; margin-bottom: 10px; }
  .flex-grow .grow1 { flex-grow: 1; background: lightcoral; }
  .flex-grow .grow2 { flex-grow: 2; background: lightgreen; }
  .flex-grow .nogrow { flex-grow: 0; background: lightyellow; }
  .flex-shrink { display: flex; width: 200px; background: lightpink; margin-bottom: 10px; }
  .flex-shrink .shrink-item { flex-basis: 100px; flex-shrink: 1; background: lightcyan; }
  .flex-shrink .noshrink { flex-basis: 100px; flex-shrink: 0; background: lavender; }
  .flex-basis { display: flex; width: 400px; background: mistyrose; margin-bottom: 10px; }
  .flex-basis .basis-item { flex-basis: 100px; background: lightblue; }
  .order { display: flex; background: honeydew; margin-bottom: 10px; }
  .order .item1 { order: 2; background: lightcoral; }
  .order .item2 { order: 1; background: lightgreen; }
  .order .item3 { order: 3; background: lightyellow; }
</style>
</head>
<body>
  <div class="flex-row"><div>A</div><div>B</div><div>C</div></div>
  <div class="flex-column"><div>X</div><div>Y</div><div>Z</div></div>
  <div class="flex-wrap"><div class="item">1</div><div class="item">2</div><div class="item">3</div><div class="item">4</div><div class="item">5</div></div>
  <div class="justify-start"><div>A</div><div>B</div><div>C</div></div>
  <div class="justify-center"><div>A</div><div>B</div><div>C</div></div>
  <div class="justify-end"><div>A</div><div>B</div><div>C</div></div>
  <div class="justify-between"><div>A</div><div>B</div><div>C</div></div>
  <div class="justify-around"><div>A</div><div>B</div><div>C</div></div>
  <div class="justify-evenly"><div>A</div><div>B</div><div>C</div></div>
  <div class="align-start"><div style="height:30px">A</div><div style="height:50px">B</div><div style="height:40px">C</div></div>
  <div class="align-center"><div style="height:30px">A</div><div style="height:50px">B</div><div style="height:40px">C</div></div>
  <div class="align-end"><div style="height:30px">A</div><div style="height:50px">B</div><div style="height:40px">C</div></div>
  <div class="align-stretch"><div>A</div><div>B</div><div>C</div></div>
  <div class="align-self"><div>A</div><div class="self-center">B</div><div class="self-end">C</div></div>
  <div class="align-content"><div class="item">A</div><div class="item">B</div><div class="item">C</div><div class="item">D</div></div>
  <div class="flex-grow"><div class="grow1">Grow 1</div><div class="grow2">Grow 2</div><div class="nogrow">No grow</div></div>
  <div class="flex-shrink"><div class="shrink-item">Shrink</div><div class="shrink-item">Shrink</div><div class="noshrink">No shrink</div></div>
  <div class="flex-basis"><div class="basis-item">100px</div><div class="basis-item">100px</div><div class="basis-item">100px</div></div>
  <div class="order"><div class="item1">Third</div><div class="item2">First</div><div class="item3">Second</div></div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Table Test</title>
</head>
<body>
<table>
<caption>Complex Table Test</caption>
<thead>
<tr>
<th>Header 1</th>
<th>Header 2</th>
<th>Header 3</th>
</tr>
</thead>
<tbody>
<tr>
<td rowspan="2">Rowspan 2</td>
<td>Cell 1,2</td>
<td>Cell 1,3</td>
</tr>
<tr>
<td colspan="2">Colspan 2</td>
</tr>
<tr>
<td>Cell 3,1</td>
<td>Cell 3,2</td>
<td>Cell 3,3</td>
</tr>
</tbody>
<tfoot>
<tr>
<td>Footer 1</td>
<td>Footer 2</td>
<td>Footer 3</td>
</tr>
</tfoot>
</table>
<table>
<caption>Nested Table</caption>
<tr>
<td>
<table>
<tr>
<td>Nested cell 1</td>
<td>Nested cell 2</td>
</tr>
</table>
</td>
</tr>
</table>
</body>
</html>

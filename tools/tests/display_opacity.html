<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Display Opacity</title>
<style>
.b {
  display: inline-block;
  width: 100px;
  height: 80px;
  margin: 5px;
  color: #fff;
  font-weight: bold;
  text-align: center;
  line-height: 80px;
}
.o0 { opacity: 0; background: #c00; }
.o25 { opacity: 0.25; background: #090; }
.o5 { opacity: 0.5; background: #00c; }
.o75 { opacity: 0.75; background: #c90; }
.o1 { opacity: 1; background: #c0c; }
</style>
</head>
<body>
<div class="b o0">0%</div>
<div class="b o25">25%</div>
<div class="b o5">50%</div>
<div class="b o75">75%</div>
<div class="b o1">100%</div>
</body>
</html>

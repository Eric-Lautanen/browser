<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Display Draw Text</title>
<style>
.text-block {
  margin: 8px;
  padding: 4px;
  border: 1px solid #ccc;
}
.s10 { font-size: 10px; }
.s14 { font-size: 14px; }
.s18 { font-size: 18px; }
.s24 { font-size: 24px; }
.s32 { font-size: 32px; }
.bold { font-weight: bold; }
</style>
</head>
<body>
<div class="text-block s10">10px Text</div>
<div class="text-block s14">14px Text</div>
<div class="text-block s18">18px Text</div>
<div class="text-block s24">24px Text</div>
<div class="text-block s32 bold">32px Bold Text</div>
</body>
</html>

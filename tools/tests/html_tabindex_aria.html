<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tabindex &amp; ARIA Attributes Test</title>
</head>
<body>
<p><span tabindex="0" role="button" aria-label="Click me">Focusable span</span></p>
<p><span tabindex="-1" aria-hidden="true">Not focusable or visible to AT</span></p>
<p lang="fr">Ceci est du texte français.</p>
<p lang="ar" dir="rtl">نص عربي من اليمين إلى اليسار.</p>
</body>
</html>

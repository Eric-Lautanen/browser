<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Regression 007: Absolute Out of Flow</title>
<style>
.parent {
  width: 300px;
  border: 2px solid #c00;
  margin: 10px;
  padding: 5px;
}
.child-abs {
  position: absolute;
  top: 0;
  left: 0;
  width: 100px;
  height: 200px;
  background: rgba(0, 150, 0, 0.3);
  border: 1px solid #090;
}
.child-normal {
  height: 40px;
  background: #cdf;
  border: 1px solid #00c;
  margin: 5px 0;
}
</style>
</head>
<body>
<div class="parent">
  <div class="child-normal">Normal child (40px)</div>
  <div class="child-abs">Absolute child (200px) - should NOT increase parent height</div>
  <div class="child-normal">Normal child (40px)</div>
</div>
<p>Parent border should be ~50px tall (padding + 2 normal children), not 250px.</p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Display Fill Rect</title>
<style>
.box {
  display: inline-block;
  width: 100px;
  height: 80px;
  margin: 5px;
  border: 1px solid #999;
}
.r1 { background-color: #ff0000; }
.r2 { background-color: #00ff00; }
.r3 { background-color: #0000ff; }
.r4 { background-color: #ffcc00; }
.r5 { background-color: #cc00ff; }
.r6 { background-color: #00cccc; }
</style>
</head>
<body>
<div class="box r1"></div>
<div class="box r2"></div>
<div class="box r3"></div>
<div class="box r4"></div>
<div class="box r5"></div>
<div class="box r6"></div>
</body>
</html>

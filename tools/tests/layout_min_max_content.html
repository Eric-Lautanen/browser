<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Layout Min Max Content</title>
<style>
.container { border: 1px solid #999; margin: 10px; padding: 5px; }
.min-c { width: min-content; background: #fdc; }
.max-c { width: max-content; background: #cfc; }
.fit-c { width: fit-content; background: #cdf; }
.fit-200 { width: fit-content(200px); background: #fcf; }
p { margin: 4px 0; word-wrap: break-word; }
</style>
</head>
<body>
<div class="container">
  <div class="min-c"><p>min-content: This box shrinks to the width of the longest word.</p></div>
  <div class="max-c"><p>max-content: This box expands to fit all content on one line.</p></div>
  <div class="fit-c"><p>fit-content: Like shrink-to-fit. Box is as wide as content but clamped by parent.</p></div>
  <div class="fit-200"><p>fit-content(200px): Like fit-content but maximum width is 200px.</p></div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Layout Writing Mode</title>
<style>
.vrl { writing-mode: vertical-rl; }
.vlr { writing-mode: vertical-lr; }
.rtl { direction: rtl; }
.ltr { direction: ltr; }
.test-box {
  border: 1px solid #666;
  margin: 10px;
  padding: 8px;
  height: 200px;
  display: inline-block;
  vertical-align: top;
  background: #f0f0f0;
}
p { margin: 4px 0; }
</style>
</head>
<body>
<div class="test-box vrl">
  <h3>vertical-rl</h3>
  <p>This text flows top to bottom, right to left.</p>
  <p>Line 2</p>
</div>
<div class="test-box vlr">
  <h3>vertical-lr</h3>
  <p>This text flows top to bottom, left to right.</p>
  <p>Line 2</p>
</div>
<div class="test-box rtl" style="text-align:start">
  <h3>direction: rtl</h3>
  <p dir="ltr">LTR: ABC abc 123</p>
  <p dir="rtl">RTL: ABC abc 123</p>
</div>
</body>
</html>

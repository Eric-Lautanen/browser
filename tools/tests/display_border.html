<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Display Border</title>
<style>
.b {
  display: inline-block;
  width: 120px;
  height: 60px;
  margin: 12px;
  padding: 4px;
  text-align: center;
  line-height: 60px;
}
.b1 { border: 2px solid black; }
.b2 { border: 4px dashed #c00; }
.b3 { border: 1px solid #090; }
.b4 { border: 3px dotted #00c; }
.b5 { border: 5px double #c90; }
.b6 { border: 2px solid #ccc; }
</style>
</head>
<body>
<div class="b b1">solid</div>
<div class="b b2">dashed</div>
<div class="b b3">thin</div>
<div class="b b4">dotted</div>
<div class="b b5">double</div>
<div class="b b6">light</div>
</body>
</html>

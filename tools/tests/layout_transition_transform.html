<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Transition &amp; Transform Test</title>
<style>
body { margin: 8px; }
.transition-box {
  display: inline-block; padding: 0.5em 1em;
  background: #005fcc; color: #fff;
  transition: background 0.3s ease, transform 0.3s ease;
}
.transform-demo {
  display: inline-block; padding: 0.5em 1em;
  background: #eef; border: 1px solid #aac;
  transform: rotate(-2deg) translateX(8px);
}
</style>
</head>
<body>
<div class="transition-box">Hover me</div>
<div class="transform-demo">rotate + translateX</div>
</body>
</html>

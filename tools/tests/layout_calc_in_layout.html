<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Layout Calc</title>
<style>
:root { --spacing: 10px; }
.parent {
  width: 300px;
  height: 200px;
  border: 1px solid #999;
  margin: 10px;
  background: #f5f5f5;
}
.cw { width: calc(100% - 20px); background: #fdc; }
.ch { height: calc(50% - 10px); background: #cfc; }
.cm { margin: calc(1em + 5px); background: #cdf; }
.cp { padding: calc(var(--spacing) * 2); background: #fcf; }
.inner { border: 1px solid #666; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="parent">
  <div class="inner cw">width: calc(100% - 20px)</div>
  <div class="inner ch">height: calc(50% - 10px)</div>
  <div class="inner cm">margin: calc(1em + 5px)</div>
  <div class="inner cp">padding: calc(var(--spacing) * 2)</div>
</div>
</body>
</html>

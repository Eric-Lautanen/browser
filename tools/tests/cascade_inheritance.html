<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cascade Inheritance Test</title>
<style>
  body { color: black; font-size: 16px; font-family: serif; line-height: 1.2; text-align: left; }
  #container { color: red; font-size: 20px; font-family: sans-serif; line-height: 1.5; text-align: center; border: 2px solid black; padding: 10px; margin: 20px; width: 500px; }
  #child1 { }
  #child2 { border: inherit; color: initial; }
</style>
</head>
<body>
  <div id="container">
    <p id="child1">Should inherit color, font-size, font-family, line-height, text-align from parent. Should NOT inherit border, padding, margin, width.</p>
    <p id="child2">Should inherit border from parent via inherit keyword. Should reset color to initial (black) via initial keyword.</p>
  </div>
</body>
</html>
